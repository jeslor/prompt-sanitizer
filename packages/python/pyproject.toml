[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "prompt-sanitizer"
version = "0.1.0"
description = "Lightweight, tiered, bidirectional PII sanitizer for LLM pipelines"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["pii", "privacy", "llm", "sanitizer", "redaction", "anonymization", "gdpr", "hipaa"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
# Zero required dependencies — fast mode runs with stdlib only
dependencies = []

[project.optional-dependencies]
nlp = [
    "transformers>=4.40.0",
    "torch>=2.0.0",
    "tokenizers>=0.19.0",
]
synthetic = [
    "faker>=24.0.0",
]
integrations = [
    "langchain>=0.2.0",
    "langchain-experimental>=0.0.60",
    "fastapi>=0.100.0",
    "llama-index-core>=0.10.0",
    "openai>=1.0.0",
]
all = [
    "prompt-sanitizer[nlp,synthetic,integrations]",
]

[project.urls]
Homepage = "https://github.com/prompt-sanitizer/prompt-sanitizer"
Repository = "https://github.com/prompt-sanitizer/prompt-sanitizer"
Issues = "https://github.com/prompt-sanitizer/prompt-sanitizer/issues"

[tool.hatch.build.targets.wheel]
packages = ["prompt_sanitizer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py310"
line-length = 100
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
